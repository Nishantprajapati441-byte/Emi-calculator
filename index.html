<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMI Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2193b0,#6dd5ed);
}

.container{
    width:400px;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#2193b0;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input[type="number"]{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

input[type="range"]{
    width:100%;
    margin-top:8px;
}

.value{
    text-align:right;
    color:#555;
    font-size:14px;
}

button{
    width:100%;
    margin-top:25px;
    padding:12px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#2193b0;
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#176f87;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#f2f2f2;
    border-radius:10px;
    line-height:2;
    font-size:17px;
}
</style>

</head>
<body>

<div class="container">

<div class="card">

<h2>EMI Calculator</h2>

<label>Loan Amount (₹)</label>

<input type="number" id="amount">

<input
type="range"
id="amountRange"
min="5000"
max="5000000"
step="1000"
value="500000"
oninput="updateAmount()">

<div class="value" id="amountValue"></div>

<label>Loan Duration (Years)</label>

<input type="number" id="year">

<input
type="range"
id="yearRange"
min="1"
max="30"
value="10"
oninput="updateYear()">

<div class="value" id="yearValue"></div>

<label>Interest Rate (%)</label>

<input
type="number"
id="interest"
value="8.5"
step="0.1">

<button onclick="calculateEMI()">
Calculate EMI
</button>

<div class="result" id="result">
EMI details will appear here.
</div>

</div>

</div>

<script>

window.onload=function(){
    updateAmount();
    updateYear();
}

function updateAmount(){

    let amount=document.getElementById("amountRange").value;

    document.getElementById("amount").value=amount;

    document.getElementById("amountValue").innerHTML=
    "₹ "+Number(amount).toLocaleString("en-IN");
}

function updateYear(){

    let year=document.getElementById("yearRange").value;

    document.getElementById("year").value=year;

    document.getElementById("yearValue").innerHTML=
    year+" Years";
}

function calculateEMI(){

    let amount=parseFloat(document.getElementById("amount").value);

    let year=parseFloat(document.getElementById("year").value);

    let interest=parseFloat(document.getElementById("interest").value);

    if(isNaN(amount)||isNaN(year)||isNaN(interest)){

        alert("Please enter all values.");

        return;
    }

    let monthlyRate=(interest/12)/100;

    let months=year*12;

    let emi=(amount*monthlyRate*Math.pow(1+monthlyRate,months))/
            (Math.pow(1+monthlyRate,months)-1);

    let totalPayment=emi*months;

    let totalInterest=totalPayment-amount;

    document.getElementById("result").innerHTML=`
    <b>Monthly EMI:</b> ₹ ${emi.toFixed(2)}<br><br>

    <b>Total Interest:</b> ₹ ${totalInterest.toFixed(2)}<br><br>

    <b>Total Payment:</b> ₹ ${totalPayment.toFixed(2)}
    `;
}

</script>

</body>
</html>
