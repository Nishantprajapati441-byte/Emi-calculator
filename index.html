<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">

    <title>EMI Calculator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .container-box{
            width:420px;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 15px 40px rgba(0,0,0,.3);
        }

        h2{
            text-align:center;
            font-weight:bold;
            color:#0d6efd;
        }

        label{
            font-weight:bold;
            margin-top:10px;
        }

        input[type="range"]{
            width:100%;
        }

        .btn{
            margin-top:20px;
            font-size:18px;
        }

        .result{
            margin-top:20px;
            background:#e8f5e9;
            padding:15px;
            border-radius:10px;
            text-align:center;
            font-size:18px;
            font-weight:bold;
        }

        .slider-value{
            font-size:14px;
            color:#666;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<div class="container-box">

<div class="card p-4">

    <h2>EMI Calculator</h2>

    <!-- Loan Amount -->
    <label>Loan Amount (₹)</label>
    <input
        type="number"
        id="amount"
        class="form-control"
    >

    <input
        type="range"
        id="amt"
        min="5000"
        max="5000000"
        step="1000"
        value="500000"
        oninput="Amountchange()"
    >

    <div class="slider-value" id="amountValue"></div>

    <!-- Years -->

    <label>Loan Duration (Years)</label>

    <input
        type="number"
        id="year"
        class="form-control"
    >

    <input
        type="range"
        id="yrs"
        min="1"
        max="30"
        value="10"
        oninput="Yearchange()"
    >

    <div class="slider-value" id="yearValue"></div>

    <!-- Interest -->

    <label>Interest Rate (%)</label>

    <input
        type="number"
        id="interest"
        class="form-control"
        value="8.5"
        step="0.1"
    >

    <button
        class="btn btn-primary w-100"
        onclick="calculateEMI()">
        Calculate EMI
    </button>

    <div class="result" id="result">
        EMI details will appear here.
    </div>

</div>

</div>

<script>

window.onload=function(){
    Amountchange();
    Yearchange();
};

function Amountchange(){

    let amount=document.getElementById("amt").value;

    document.getElementById("amount").value=amount;

    document.getElementById("amountValue").innerHTML=
    "₹ "+Number(amount).toLocaleString("en-IN");

}

function Yearchange(){

    let year=document.getElementById("yrs").value;

    document.getElementById("year").value=year;

    document.getElementById("yearValue").innerHTML=
    year+" Years";

}

function calculateEMI(){

    let amount=parseFloat(document.getElementById("amount").value);

    let year=parseFloat(document.getElementById("year").value);

    let interest=parseFloat(document.getElementById("interest").value);

    if(isNaN(amount)||isNaN(year)||isNaN(interest)){

        alert("Please enter all values.");

        return;

    }

    let monthlyRate=(interest/12)/100;

    let months=year*12;

    let emi=(amount*monthlyRate*Math.pow(1+monthlyRate,months))/
    (Math.pow(1+monthlyRate,months)-1);

    let totalPayment=emi*months;

    let totalInterest=totalPayment-amount;

    document.getElementById("result").innerHTML=
    `
    <h4 class="text-success">Result</h4>

    <p>Monthly EMI</p>

    <h3>₹ ${emi.toFixed(2)}</h3>

    <hr>

    <p><b>Loan Amount:</b> ₹ ${amount.toLocaleString("en-IN")}</p>

    <p><b>Total Interest:</b> ₹ ${totalInterest.toFixed(2)}</p>

    <p><b>Total Payment:</b> ₹ ${totalPayment.toFixed(2)}</p>

    <p><b>Loan Duration:</b> ${year} Years (${months} Months)</p>

    <p><b>Interest Rate:</b> ${interest}%</p>
    `;

}

</script>

</body>
</html>
